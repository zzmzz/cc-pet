name: Build CC Pet

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# tauri-action 会创建 Release 并上传产物；默认 GITHUB_TOKEN 无写权限会报
# "Resource not accessible by integration"
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: CCPet-Linux
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: CCPet-Windows
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact: CCPet-macOS

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: "See the assets to download and install this version."
          releaseDraft: false
          prerelease: false

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Release created by tauri-action
        run: echo "Release was created by tauri-action in the build jobs"
